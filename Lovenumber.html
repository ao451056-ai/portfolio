
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>عداد الحب ❤️</title>

<style>
 /* body{

.container{
    text-align:center;
    width:90%;
    max-width:700px;
}

.date{
    background:#111;
    display:inline-block;
    padding:12px 30px;
    border-radius:40px;
    margin-bottom:40px;
    font-size:28px;
    box-shadow:0 0 20px #ff4fd8;
}

.title{
    font-size:55px;
    margin-bottom:30px;
}

.card{
    background:rgba(255,255,255,0.08);
    padding:40px 20px;
    border-radius:30px;
    backdrop-filter: blur(10px);
}

.counter{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-top:30px;
}

.box{
    background:rgba(255,255,255,0.1);
    padding:25px;
    border-radius:20px;
}

.num{
    font-size:40px;
    font-weight:bold;
}

.label{
    margin-top:10px;
    font-size:18px;
    opacity:.8;
}
</style>
<link rel="stylesheet" href="css/style.css">
</head>

<body>



     <header>
        <h1>⏳ بداية عمري معاكي ❤️</h1>
        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="gallery.html">الفيديوهات</a>
            <a href="articles.html">المقالات</a>
            <a href="days.html">عشقي</a>
            <a href="Lovenumber.html">عدد الأيام</a>
        </nav>
    </header>




<div class="container">

    <div class="date">📅 1-4-2026</div>

    <div class="title">❤️ بداية عمري معاكي</div>

    <div class="card">

        <h2>هيفضل شغال طول عمرنا ❤️</h2>

        <div class="counter">

            <div class="box">
                <div class="num" id="years">0</div>
                <div class="label">سنة</div>
            </div>

            <div class="box">
                <div class="num" id="months">0</div>
                <div class="label">شهر</div>
            </div>

            <div class="box">
                <div class="num" id="days">0</div>
                <div class="label">يوم</div>
            </div>

            <div class="box">
                <div class="num" id="hours">0</div>
                <div class="label">ساعة</div>
            </div>

            <div class="box">
                <div class="num" id="minutes">0</div>
                <div class="label">دقيقة</div>
            </div>

            <div class="box">
                <div class="num" id="seconds">0</div>
                <div class="label">ثانية</div>
            </div>

        </div>

    </div>
</div>

<script>

const startDate = new Date("2026-01-04T00:00:00");

function updateCounter(){

    const now = new Date();

    let diff = now - startDate;

    const seconds = Math.floor(diff / 1000) % 60;
    const minutes = Math.floor(diff / (1000 * 60)) % 60;
    const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;

    const totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));

    const years = Math.floor(totalDays / 365);
    const months = Math.floor((totalDays % 365) / 30);
    const days = (totalDays % 365) % 30;

    document.getElementById("years").innerText = years;
    document.getElementById("months").innerText = months;
    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;
    document.getElementById("seconds").innerText = seconds;
}

setInterval(updateCounter,1000);

updateCounter();

</script>

</body>
</html>
